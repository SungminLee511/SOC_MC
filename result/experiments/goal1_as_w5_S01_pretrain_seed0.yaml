# Goal 1 Stage 1: Pre-train AS on W5 restricted to S={0,1}
goal: 1
stage: pretrain
seed: 0
n_epochs: 500

model:
  config: model/configs/as_default.yaml

benchmark:
  config: benchmark/configs/w5.yaml

subset:
  S: [0, 1]
  full_target: false

init:
  from_checkpoint: null
  noise_level: 0.0

logging:
  checkpoint_every: 100
  eval_every: 0
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_as_w5_S01_pretrain_seed0/
  log_file: result/logs/goal1_as_w5_S01_pretrain_seed0.csv
