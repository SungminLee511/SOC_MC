# Goal 1 Stage 2: Stability test — AS on W5, init from S=[0] pretrain
goal: 1
stage: stability
seed: 3
n_epochs: 200

model:
  config: model/configs/as_default.yaml

benchmark:
  config: benchmark/configs/w5.yaml

subset:
  S: [0]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_as_w5_S0_pretrain_seed0/epoch_500.pt
  noise_level: 0.0

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_as_w5_S0_stability_seed3/
  log_file: result/logs/goal1_as_w5_S0_stability_seed3.csv
