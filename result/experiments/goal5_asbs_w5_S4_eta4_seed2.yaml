goal: 5
stage: escape
seed: 2
n_epochs: 300

model:
  config: model/configs/asbs_default.yaml

benchmark:
  config: benchmark/configs/w5.yaml

subset:
  S: [4]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_asbs_w5_S4_pretrain_seed0/epoch_500.pt
  noise_level: 0.0

training:
  override_lr: 0.004174046318054992

logging:
  checkpoint_every: 300
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal5_asbs_w5_S4_eta4_seed2/
  log_file: result/logs/goal5_asbs_w5_S4_eta4_seed2.csv
