# Goal 1 Ablation 1.1: Init noise eta=0.1 — ASBS on C5, S=[1, 4]
goal: 1
stage: stability
seed: 1
n_epochs: 200

model:
  config: model/configs/asbs_default.yaml

benchmark:
  config: benchmark/configs/c5.yaml

subset:
  S: [1, 4]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_asbs_c5_S14_pretrain_seed0/epoch_500.pt
  noise_level: 0.1

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_asbs_c5_S14_noise01_seed1/
  log_file: result/logs/goal1_asbs_c5_S14_noise01_seed1.csv
