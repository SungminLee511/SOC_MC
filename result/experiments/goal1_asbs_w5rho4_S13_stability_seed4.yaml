# Goal 1 Ablation 1.2: Mode sep rho=4 stability — ASBS on W5, S=[1, 3]
goal: 1
stage: stability
seed: 4
n_epochs: 200

model:
  config: model/configs/asbs_default.yaml

benchmark:
  config: benchmark/configs/w5_rho4.yaml

subset:
  S: [1, 3]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_asbs_w5rho4_S13_pretrain_seed0/epoch_500.pt
  noise_level: 0.0

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_asbs_w5rho4_S13_stability_seed4/
  log_file: result/logs/goal1_asbs_w5rho4_S13_stability_seed4.csv
