# Goal 1 Ablation 1.1: Init noise eta=0.05 — AS on W5, S=[1, 3]
goal: 1
stage: stability
seed: 2
n_epochs: 200

model:
  config: model/configs/as_default.yaml

benchmark:
  config: benchmark/configs/w5.yaml

subset:
  S: [1, 3]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_as_w5_S13_pretrain_seed0/epoch_500.pt
  noise_level: 0.05

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_as_w5_S13_noise005_seed2/
  log_file: result/logs/goal1_as_w5_S13_noise005_seed2.csv
