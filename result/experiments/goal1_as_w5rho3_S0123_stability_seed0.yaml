# Goal 1 Ablation 1.2: Mode sep rho=3 stability — AS on W5, S=[0, 1, 2, 3]
goal: 1
stage: stability
seed: 0
n_epochs: 200

model:
  config: model/configs/as_default.yaml

benchmark:
  config: benchmark/configs/w5_rho3.yaml

subset:
  S: [0, 1, 2, 3]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_as_w5rho3_S0123_pretrain_seed0/epoch_500.pt
  noise_level: 0.0

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_as_w5rho3_S0123_stability_seed0/
  log_file: result/logs/goal1_as_w5rho3_S0123_stability_seed0.csv
