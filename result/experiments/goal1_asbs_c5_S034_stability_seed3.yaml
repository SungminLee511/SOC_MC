# Goal 1 Stage 2: Stability test — ASBS on C5, init from S=[0, 3, 4] pretrain
goal: 1
stage: stability
seed: 3
n_epochs: 200

model:
  config: model/configs/asbs_default.yaml

benchmark:
  config: benchmark/configs/c5.yaml

subset:
  S: [0, 3, 4]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_asbs_c5_S034_pretrain_seed0/epoch_500.pt
  noise_level: 0.0

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_asbs_c5_S034_stability_seed3/
  log_file: result/logs/goal1_asbs_c5_S034_stability_seed3.csv
