# Goal 1 Ablation 1.1: Init noise eta=0.05 — AS on W5, S=[0, 2, 3, 4]
goal: 1
stage: stability
seed: 4
n_epochs: 200

model:
  config: model/configs/as_default.yaml

benchmark:
  config: benchmark/configs/w5.yaml

subset:
  S: [0, 2, 3, 4]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_as_w5_S0234_pretrain_seed0/epoch_500.pt
  noise_level: 0.05

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_as_w5_S0234_noise005_seed4/
  log_file: result/logs/goal1_as_w5_S0234_noise005_seed4.csv
