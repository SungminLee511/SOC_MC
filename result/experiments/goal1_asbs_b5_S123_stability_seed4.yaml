# Goal 1 Stage 2: Stability test — ASBS on B5, init from S=[1, 2, 3] pretrain
goal: 1
stage: stability
seed: 4
n_epochs: 200

model:
  config: model/configs/asbs_default.yaml

benchmark:
  config: benchmark/configs/b5.yaml

subset:
  S: [1, 2, 3]
  full_target: true

init:
  from_checkpoint: result/checkpoints/goal1_asbs_b5_S123_pretrain_seed0/epoch_500.pt
  noise_level: 0.0

logging:
  checkpoint_every: 40
  eval_every: 20
  n_eval_samples: 10000

output:
  checkpoint_dir: result/checkpoints/goal1_asbs_b5_S123_stability_seed4/
  log_file: result/logs/goal1_asbs_b5_S123_stability_seed4.csv
